<form id="registrationForm" class="form-container">
  <div class="input-group">
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Choose a username">
    <span class="error-text" id="usernameError">Username must be at least 4 characters.</span>
  </div>

  <div class="input-group">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter your email">
    <span class="error-text" id="emailError">Please enter a valid email address.</span>
  </div>

  <button type="submit" id="submitBtn" disabled>Create Account</button>
</form>
